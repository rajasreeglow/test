<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rajasree | Web Developer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    .container {
      max-width: 1000px;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    h1 span {
      color: #00e6e6;
    }

    .subtitle {
      font-size: 1.3rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px;
      max-width: 700px;
      margin: auto;
    }

    .skills {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .skill {
      padding: 12px 22px;
      border-radius: 25px;
      background: #00e6e6;
      color: #003333;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      user-select: none;
    }

    .skill:hover,
    .skill.active {
      background: #00cccc;
      transform: scale(1.1);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fff;
      color: #003333;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.3s ease;
    }

    .modal-content h2 {
      margin-top: 0;
      color: #0f2027;
    }

    .close-btn {
      margin-top: 20px;
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      background: #0f2027;
      color: #fff;
      cursor: pointer;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

    <div class="card">
      <div class="skills">
        <div class="skill" onclick="openModal(this,'HTML','HyperText Markup Language')">HTML</div>
        <div class="skill" onclick="openModal(this,'CSS','Cascading Style Sheets')">CSS</div>
        <div class="skill" onclick="openModal(this,'JS','JavaScript')">JS</div>
        <div class="skill" onclick="openModal(this,'DSA','Data Structures and Algorithms')">DSA</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    function openModal(element, title, text) {
      document.querySelectorAll('.skill')
        .forEach(s => s.classList.remove('active'));

      element.classList.add('active');

      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalText').innerText =
        title + " stands for " + text + ".";

      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      document.querySelectorAll('.skill')
        .forEach(s => s.classList.remove('active'));
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === "Escape") closeModal();
    });
  </script>

</body>
</html>
