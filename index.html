<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hamster Run 🐹</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  overflow: hidden;
}
h1 { margin: 10px; }
#game {
  position: relative;
  width: 600px;
  height: 300px;
  margin: 20px auto;
  border: 3px solid #333;
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
}
.hamster {
  position: absolute;
  bottom: 10px;
  left: 50px;
  font-size: 50px;
}
.obstacle {
  position: absolute;
  bottom: 10px;
  width: 40px;
  height: 40px;
  background: #ff7043;
  border-radius: 10px;
}
#scoreboard { margin-top: 10px; font-size: 18px; }
button {
  padding: 8px 16px;
  border: none;
  border-radius: 20px;
  background: #ff7f50;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>Hamster Run 🐹</h1>
<div id="game">
  <div class="hamster" id="hamster">🐹</div>
</div>
<div id="scoreboard">Score: 0</div>
<button onclick="startGame()">Start Game</button>
<p>Press <b>Spacebar</b> or click Jump to jump</p>
<button onclick="jump()">Jump</button>

<script>
const game = document.getElementById("game");
const hamster = document.getElementById("hamster");
const scoreboard = document.getElementById("scoreboard");

let hamsterBottom = 10;
let isJumping = false;
let obstacles = [];
let score = 0;
let gameInterval;
let spawnInterval;
let speed = 5;
let gameOverFlag = false;

document.addEventListener("keydown", e => {
  if(e.code === "Space") jump();
});

function jump() {
  if(isJumping || gameOverFlag) return;
  isJumping = true;
  let up = setInterval(() => {
    if(hamsterBottom >= 150) clearInterval(up);
    else hamsterBottom += 10;
    hamster.style.bottom = hamsterBottom + "px";
  },20);

  setTimeout(() => {
    let down = setInterval(() => {
      if(hamsterBottom <= 10) { clearInterval(down); isJumping = false; }
      else { hamsterBottom -= 10; hamster.style.bottom = hamsterBottom + "px"; }
    },20);
  }, 400);
}

function spawnObstacle() {
  const obs = document.createElement("div");
  obs.className = "obstacle";
  obs.style.left = "600px";
  game.appendChild(obs);
  obstacles.push(obs);
}

function moveObstacles() {
  obstacles.forEach((obs,i) => {
    let left = parseInt(obs.style.left);
    if(left < -40) { 
      game.removeChild(obs); 
      obstacles.splice(i,1); 
      score++; // increase score for each obstacle passed
      updateScore();
    }
    else obs.style.left = (left - speed) + "px";

    // collision
    if(left < 100 && left > 50 && hamsterBottom < 50) {
      endGame();
    }
  });
}

function updateScore() { scoreboard.textContent = "Score: " + score; }

function startGame() {
  // reset
  obstacles.forEach(o=>game.removeChild(o));
  obstacles=[];
  hamsterBottom=10;
  hamster.style.bottom = hamsterBottom + "px";
  score=0; gameOverFlag=false;
  updateScore();
  speed=5;

  spawnInterval = setInterval(spawnObstacle, 1500);
  gameInterval = setInterval(() => {
    moveObstacles();
    speed += 0.001; // gradually increase speed
  }, 20);
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(spawnInterval);
  gameOverFlag=true;
  alert("Game Over! Score: " + score);
}
</script>

</body>
</html>
