<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hamster Run 🐹</title>

<style>

body{
    text-align:center;
    font-family:Arial;
    background:linear-gradient(#87CEEB,#ffffff); /* SKY BACKGROUND */
}

/* Game area */

#game{
    width:600px;
    height:200px;
    border:3px solid black;
    margin:auto;
    position:relative;
    overflow:hidden;
    background:#d4f4ff; /* GAME BACKGROUND COLOR */
}

/* Ground */

#ground{
    width:100%;
    height:20px;
    background:#6b4f2a;
    position:absolute;
    bottom:0;
}

/* Hamster */

#hamster{
    font-size:40px;
    position:absolute;
    bottom:20px;
    left:50px;
}

/* Obstacle */

#block{
    width:30px;
    height:40px;
    background:#ff4444;
    position:absolute;
    bottom:20px;
    right:-30px;
}

/* Jump animation */

.jump{
    animation:jump 0.6s linear;
}

@keyframes jump{
    0%{bottom:20px;}
    40%{bottom:110px;}
    60%{bottom:110px;}
    100%{bottom:20px;}
}

button{
    margin:10px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<h2>🐹 Hamster Run Game</h2>

<div id="game">

    <div id="hamster">🐹</div>
    <div id="block"></div>
    <div id="ground"></div>

</div>

<br>

<button onclick="startGame()">Start</button>
<button onclick="jump()">Jump</button>

<h3 id="score">Score: 0</h3>

<script>

let hamster = document.getElementById("hamster");
let block = document.getElementById("block");
let scoreText = document.getElementById("score");

let blockPos = 600;
let gameRunning = false;
let score = 0;

/* Jump */

function jump(){

    if(!hamster.classList.contains("jump")){
        hamster.classList.add("jump");

        setTimeout(()=>{
            hamster.classList.remove("jump");
        },600);
    }

}

/* Start Game */

function startGame(){

    if(gameRunning) return;

    gameRunning = true;
    score = 0;

    let gameLoop = setInterval(()=>{

        blockPos -= 5;

        if(blockPos < -30){
            blockPos = 600;
            score++;
            scoreText.innerText = "Score: " + score;
        }

        block.style.right = (600 - blockPos) + "px";

        let hamsterBottom = parseInt(window.getComputedStyle(hamster).getPropertyValue("bottom"));

        if(blockPos < 120 && blockPos > 60 && hamsterBottom < 50){
            alert("Game Over 🐹\nScore: " + score);
            blockPos = 600;
            block.style.right = "0px";
            gameRunning = false;
            clearInterval(this);
        }

    },20);

}

/* Keyboard control */

document.addEventListener("keydown",(e)=>{
    if(e.code === "Space"){
        jump();
    }
});

</script>

</body>
</html>
